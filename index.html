<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="" />
    <title>Loading…</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="app"></div>

    <!--
      Script load order is intentional — each file depends on the one above it:
        utils.js      → shared helpers (countdown, escape)
        blocks.js     → block renderers (uses Utils)
        page.js       → page data (window.PAGE_DATA)
        renderer.js   → rendering engine (uses Blocks, Utils, PAGE_DATA)
        app.js        → boot (calls Renderer)
    -->
    <script src="js/utils.js"></script>
    <script src="components/blocks.js"></script>
    <script src="data/page.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
