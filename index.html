<!DOCTYPE html>
<html lang="ka">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary meta ──────────────────────────────────────── -->
    <title>შავლეგო — გაპარსვის პრო კომპლექტი</title>
    <meta name="description"
          content="5-თავაკიანი გაპარსვის სისტემა — 99₾. ალოე ვერა, FlexGlide® ტექნოლოგია. უფასო მიწოდება. შეზღუდული შეთავაზება." />

    <!-- ── Open Graph (required for Meta ads link previews) ──── -->
    <!--
      BEFORE GOING LIVE:
        og:url   → replace with your real landing page URL
        og:image → upload a 1200×630 product image to /images/
                   then set the absolute URL here
    -->
    <meta property="og:type"         content="website" />
    <meta property="og:url"          content="https://www.shavlego.one/" />
    <meta property="og:title"        content="შავლეგო — გაპარსვის პრო კომპლექტი" />
    <meta property="og:description"  content="5-თავაკიანი გაპარსვის სისტემა — 99₾. ალოე ვერა, FlexGlide® ტექნოლოგია. უფასო მიწოდება. შეზღუდული შეთავაზება." />
    <meta property="og:image"        content="https://www.shavlego.one/images/og-image.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"       content="ka_GE" />

    <!-- ── Meta Pixel ────────────────────────────────────────────
         Replace YOUR_PIXEL_ID with your actual pixel ID.
         Uncomment the block below when ready.
    ─────────────────────────────────────────────────────────── -->

    <!-- ── Fonts ─────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
          as="style"
          onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
            rel="stylesheet" />
    </noscript>

    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="app"></div>

    <!--
      Load order matters — each file depends on the one above it:
        utils.js     → helpers: countdown, color, HTML escape
        blocks.js    → one render function per block type
        content.js   → page content: sets window.PAGE_DATA
        renderer.js  → turns PAGE_DATA into DOM
        app.js       → calls Renderer.render() on DOMContentLoaded
    -->
    <script src="js/utils.js"></script>
    <script src="components/blocks.js"></script>
    <script src="data/content.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
