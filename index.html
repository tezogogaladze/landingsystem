<!DOCTYPE html>
<html lang="ka">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="" />
    <title>შავლეგო</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="app"></div>

    <!--
      Load order matters — each file depends on the one above it:
        utils.js     → helpers: countdown, color, HTML escape
        blocks.js    → one render function per block type
        content.js   → page content: sets window.PAGE_DATA
        renderer.js  → turns PAGE_DATA into DOM
        app.js       → calls Renderer.render() on DOMContentLoaded
    -->
    <script src="js/utils.js"></script>
    <script src="components/blocks.js"></script>
    <script src="data/content.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
